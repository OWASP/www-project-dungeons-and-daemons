---
name: Build and Deploy
on:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  hardening:
    name: Hardening
    runs-on: ubuntu-latest
    steps:
      # Make sure we have some code to test
      - name: Harden runner
        uses: step-security/harden-runner@5c7944e73c4c2a096b17a9cb74d65b6c2bbafbde # v2.9.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github-cloud.githubusercontent.com:443
            github.com:443
            motd.ubuntu.com:443
            keys.openpgp.org:443
            linux72.unoeuro.com:22
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        name: Install pnpm
        with:
          version: 10.0.0
          run_install: false
      - name: Setup node
        uses: actions/setup-node@26961cf329f22f6837d5f54c3efd76b480300ace # v4.0.3
        with:
          node-version: '20.18.2'
      - name: Build
        run: |
          pnpm install          # Install dependencies
          pnpm run build       # Build production version
      - name: Deploy
        uses: cloudflare/wrangler-action@f84a562284fc78278ff9052435d9526f9c718361
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          wranglerVersion: "4.73.0"
          command: pages deploy build --project-name=dungeonsanddaemons

      - name: Deploy the worker routes
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.18.0"
          command: deploy script/nonce-worker.js --config script/wrangler.toml --env production
        env: 
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}